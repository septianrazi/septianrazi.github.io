<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Septian Razi</title>
	<link rel='stylesheet' id='normalize' href='/assets/css/normalize.css' type='text/css' media='all' />

	<link rel='stylesheet' id='main-stylesheet' href='/assets/css/styles.css' type='text/css' media='all' />

	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">

	<!-- Favicons -->
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="manifest" href="/site.webmanifest">

	<!-- SEO Meta Tags -->
	<meta name="description" content="Septian Razi - Software Engineer & Adventurer. Currently building high-performance applications and traveling the world.">
	<meta name="keywords" content="Septian Razi, Software Engineer, Web Development, Jekyll, Neumorphism, Adventure">
	
	<!-- Open Graph / Facebook -->
	<meta property="og:type" content="website">
	<meta property="og:url" content="{{ site.url }}{{ page.url }}">
	<meta property="og:title" content="{{ page.title | default: site.title }}">
	<meta property="og:description" content="Software Engineer & Adventurer. Explore my portfolio and projects.">
	<meta property="og:image" content="{{ site.url }}/assets/images/logosIcons/logo.png">

	<!-- Twitter -->
	<meta property="twitter:card" content="summary_large_image">
	<meta property="twitter:url" content="{{ site.url }}{{ page.url }}">
	<meta property="twitter:title" content="{{ page.title | default: site.title }}">
	<meta property="twitter:description" content="Software Engineer & Adventurer. Explore my portfolio and projects.">
	<meta property="twitter:image" content="{{ site.url }}/assets/images/logosIcons/logo.png">

	<!-- Theme Logic -->
	<script src="/assets/js/theme.js"></script>

</head>

<body>
	<div class="full-page-parent">

		{% include header.html %}

		<!-- CONTENT -->
		{{ content }}



		<!-- {% include footer.html %} -->


	</div>






	<!-- Scripts -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
