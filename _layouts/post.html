---
layout: default
no_hero: true
---
<section class="blog-section">
  <div class="glass-panel reveal" style="width:100%; max-width: 900px; margin: 0 auto; background: rgba(6,6,8,0.85); backdrop-filter: blur(12px);">
    <div class="sec-label"><div class="sec-label-line"></div><span>{{ page.cat | default: "Writing" }} &middot; {{ page.date | date: "%B %d, %Y" }}</span></div>
    <h1 class="sec-title" style="font-size: clamp(42px, 5vw, 64px); margin-bottom: 32px;">{{ page.title }}</h1>
    
    {% if page.image %}
    <div class="post-hero" style="margin-bottom: 48px; border-radius: 4px; overflow: hidden; border: 1px solid var(--border); background: var(--black2);">
      <img src="{{ page.image | relative_url }}" alt="{{ page.title }}" style="width: 100%; aspect-ratio: 21/9; object-fit: cover; display: block; opacity: 0.85; filter: contrast(1.1);">
    </div>
    {% endif %}

    <div class="blog-content" style="font-size: 16px; color: var(--grey); line-height: 1.8;">
      {{ content }}
    </div>
    
    <div style="margin-top: 56px; padding-top: 24px; border-top: 1px solid var(--border);">
      <a href="{{ '/blog' | relative_url }}" class="btn-outline"><i class="bi bi-arrow-left"></i> Back to Blog</a>
    </div>
  </div>
</section>

<style>
  .blog-content h1, .blog-content h2, .blog-content h3 {
    color: var(--white);
    margin-top: 2.5em;
    margin-bottom: 1em;
  }
  .blog-content p {
    margin-bottom: 1.5em;
  }
  .blog-content img {
    max-width: 100%;
    height: auto;
    display: block;
    margin: 2.5rem auto;
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
  }
  .blog-content ul, .blog-content ol {
    margin-bottom: 1.5em;
    padding-left: 1.5rem;
  }
  .blog-content li {
    margin-bottom: 0.5em;
  }
  .blog-content blockquote {
    margin: 2rem 0;
    padding: 1rem 1.5rem;
    border-left: 3px solid var(--red);
    background: rgba(255,255,255,0.03);
    color: var(--white);
    font-style: italic;
  }
  .blog-content code {
    font-family: var(--font-mono);
    background: var(--black2);
    padding: 0.2em 0.4em;
    border-radius: 3px;
    font-size: 0.9em;
  }
  .blog-content a {
    color: var(--red);
    text-decoration: underline;
  }
  .blog-content a:hover {
    color: var(--red-bright);
  }
  .post-footer { 
    flex-direction: column; align-items: flex-start; 
  }

</style>
